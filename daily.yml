name: 🌴🇦🇷 Monitor Passagens — Florida + Buenos Aires

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT
    - cron: '0 16 * * *'   # 13:00 BRT
    - cron: '0 21 * * *'   # 18:00 BRT
  workflow_dispatch:

jobs:
  buscar-passagens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Buscar passagens e notificar
        env:
          SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SHEETS_WEBHOOK:   ${{ secrets.SHEETS_WEBHOOK }}
        run: python monitor.py
