<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Passagens"/>
<title>✈️ Monitor de Passagens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060d1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:500px;margin:0 auto}
button{cursor:pointer;font-family:inherit;transition:all .15s}

/* HEADER */
#header{background:#060d1a;border-bottom:1px solid #0f1f38;position:sticky;top:0;z-index:99;padding:12px 16px 0}

/* DEST SELECTOR */
.dest-bar{display:flex;gap:8px;margin-bottom:12px}
.dest-btn{flex:1;padding:8px 12px;border-radius:12px;border:1px solid #1e293b;background:#0a1628;color:#64748b;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.dest-btn.active{border-color:#38bdf8;background:#1e3a5f;color:#e2e8f0}

/* TAB BAR */
#tabbar{display:flex;border-top:1px solid #0f1f38}
.tab{flex:1;padding:10px 0 8px;background:none;border:none;border-bottom:2px solid transparent;color:#475569}
.tab.active{border-bottom-color:#38bdf8;color:#38bdf8}
.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.tab-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* CONTENT */
#content{padding:16px 14px 40px}
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:linear-gradient(135deg,#0f1f38,#0a1628);border:1px solid #1e3a5f;border-radius:18px;padding:16px;margin-bottom:12px}
.card-sm{background:#0a1628;border:1px solid #1e293b;border-radius:14px;padding:12px}
.section-label{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:4px}

/* TAGS / PILLS */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill-green{background:#22c55e22;color:#22c55e}
.pill-yellow{background:#f59e0b22;color:#f59e0b}
.pill-red{background:#ef4444;color:#fff}
.pill-blue{background:#38bdf822;color:#38bdf8}
.pill-purple{background:#a78bfa22;color:#a78bfa}

/* GRIDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

/* TABLE */
.tbl-head{padding:10px 14px;background:#060d1a;border-bottom:1px solid #1e293b;display:grid;gap:6px;font-size:9px;color:#475569;font-weight:700;text-transform:uppercase}
.tbl-row{padding:10px 14px;border-bottom:1px solid #0a1628;display:grid;gap:6px;align-items:center}

/* GAUGE */
.gauge-track{position:relative;height:6px;background:#1e293b;border-radius:4px;margin:10px 0 4px}
.gauge-dot{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;border:2px solid #060d1a;transform:translateX(-50%);display:none}
.gauge-labels{display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:2px}

/* STATUS */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0a1628;border:1px solid #1e293b;border-radius:14px;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}

/* ALERT BANNER */
.alert-banner{background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e44;border-radius:16px;padding:14px 16px;margin-bottom:14px}

/* TOGGLE */
.toggle{display:flex;background:#0a1628;border:1px solid #1e293b;border-radius:14px;padding:4px;margin-bottom:14px;gap:4px}
.tog-btn{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;color:#64748b;font-weight:700;font-size:13px}
.tog-btn.active{background:#1e3a5f;color:#38bdf8}

/* ACCORDION */
.acc-item{background:#0a1628;border:1px solid #1e293b;border-radius:14px;padding:14px 16px;margin-bottom:8px}
.acc-item.open{background:linear-gradient(135deg,#0f1f38,#0a1628);border-color:#1e3a5f}
.acc-head{display:flex;justify-content:space-between;align-items:center}
.acc-arrow{font-size:16px;color:#475569;transition:transform .2s}
.acc-item.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;margin-top:12px;font-size:13px;color:#94a3b8;line-height:1.7;border-top:1px solid #1e293b;padding-top:12px}
.acc-item.open .acc-body{display:block}

/* TIMELINE */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:linear-gradient(#38bdf8,#ef4444)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-16px;top:3px;width:10px;height:10px;border-radius:50%;border:2px solid #060d1a}
.tl-date{font-size:11px;font-weight:700;margin-bottom:2px}
.tl-text{font-size:12px;color:#94a3b8;line-height:1.4}

/* ROUTE STEPS */
.route-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.route-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}

/* FERIADO CARD */
.feriado-card{border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid #1e293b;background:#0a1628}
.feriado-card.oferta{background:linear-gradient(135deg,#14532d18,#0a1628);border-color:#22c55e55}
.feriado-card.erro{background:linear-gradient(135deg,#7f1d1d22,#0a1628);border-color:#ef444455}
.feriado-card.bom{background:linear-gradient(135deg,#1e3a5f22,#0a1628);border-color:#38bdf855}

.empty{text-align:center;padding:50px 20px;color:#475569;font-size:14px;line-height:1.6}
.empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<div id="header">
  <!-- DESTINATION SELECTOR -->
  <div class="dest-bar">
    <button class="dest-btn active" id="dest-fl" onclick="setDest('florida')">
      🌴 <span>Flórida 2027</span>
    </button>
    <button class="dest-btn" id="dest-ba" onclick="setDest('buenos_aires')">
      🇦🇷 <span>Buenos Aires</span>
    </button>
  </div>

  <!-- TABS - mudam por destino -->
  <div id="tabbar">
    <button class="tab active" id="tab0" onclick="goTab(0)"><span class="tab-icon">🏠</span><span class="tab-label">Início</span></button>
    <button class="tab" id="tab1" onclick="goTab(1)"><span class="tab-icon">📈</span><span class="tab-label">Histórico</span></button>
    <button class="tab" id="tab2" onclick="goTab(2)"><span class="tab-icon">✈️</span><span class="tab-label">Cias</span></button>
    <button class="tab" id="tab3" onclick="goTab(3)"><span class="tab-icon">🗺️</span><span class="tab-label">Rotas</span></button>
    <button class="tab" id="tab4" onclick="goTab(4)"><span class="tab-icon">💡</span><span class="tab-label">Dicas</span></button>
  </div>
</div>

<div id="content">
  <!-- FLORIDA PAGES -->
  <div id="fl-0" class="page active" data-dest="florida" data-idx="0"></div>
  <div id="fl-1" class="page" data-dest="florida" data-idx="1"></div>
  <div id="fl-2" class="page" data-dest="florida" data-idx="2"></div>
  <div id="fl-3" class="page" data-dest="florida" data-idx="3"></div>
  <div id="fl-4" class="page" data-dest="florida" data-idx="4"></div>
  <!-- BA PAGES -->
  <div id="ba-0" class="page" data-dest="buenos_aires" data-idx="0"></div>
  <div id="ba-1" class="page" data-dest="buenos_aires" data-idx="1"></div>
  <div id="ba-2" class="page" data-dest="buenos_aires" data-idx="2"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FL_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIBq1y2H4_Q1qCEG9kXdTEmQAtiNrS6kzb9n8sDdFUbVq-gKL_rYRS-IqOHyq6iwPvSNTn_wPnocRh/pub?gid=1427060977&single=true&output=csv";
// Quando criar a aba Buenos Aires, publique e cole a URL aqui:
const BA_SHEETS = "";

const FL_ECON_FIRE=3500,FL_ECON_GOOD=4500,FL_EXEC_FIRE=9000,FL_EXEC_GOOD=13000;
const BA_FIRE=500,BA_GOOD=900,BA_ERRO=280;

let DEST = "florida";
let CUR_TAB = 0;
let FL_DATA = [], BA_DATA = [];

// Feriados para mostrar no portal
const FERIADOS = [
  {nome:"Tiradentes + Páscoa",ida:"2026-04-18",volta:"2026-04-21",dias:4},
  {nome:"Dia do Trabalho",    ida:"2026-05-01",volta:"2026-05-03",dias:3},
  {nome:"Corpus Christi",     ida:"2026-06-11",volta:"2026-06-13",dias:3},
  {nome:"Independência",      ida:"2026-09-05",volta:"2026-09-07",dias:3},
  {nome:"Nossa Senhora",      ida:"2026-10-10",volta:"2026-10-12",dias:3},
  {nome:"Finados",            ida:"2026-10-31",volta:"2026-11-02",dias:3},
  {nome:"Natal",              ida:"2026-12-25",volta:"2026-12-27",dias:3},
  {nome:"Réveillon",          ida:"2026-12-31",volta:"2027-01-02",dias:3},
  {nome:"Carnaval",           ida:"2027-02-13",volta:"2027-02-16",dias:4},
  {nome:"Semana Santa",       ida:"2027-04-01",volta:"2027-04-04",dias:4},
  {nome:"Independência",      ida:"2027-09-04",volta:"2027-09-07",dias:4},
  {nome:"Nossa Senhora",      ida:"2027-10-09",volta:"2027-10-12",dias:4},
  {nome:"Finados",            ida:"2027-10-30",volta:"2027-11-02",dias:4},
  {nome:"Proclamação",        ida:"2027-11-13",volta:"2027-11-15",dias:3},
];

// ── UTILS ─────────────────────────────────────────────────────────────────────
function pp(s){return parseInt(String(s||"").replace(/[R$\s]/g,"").replace(/\./g,"").replace(",","."))||0}
function fmt(v){return v?"R$ "+Number(v).toLocaleString("pt-BR"):"—"}
function fmtK(v){return v?"R$"+(v/1000).toFixed(0)+"k":"—"}
function pColor(v,fire,good){if(!v)return"#334155";if(v<=fire)return"#22c55e";if(v<=good)return"#f59e0b";return"#ef4444"}
function pTag(v,fire,good){if(!v)return{c:"#334155",l:"Sem dados"};if(v<=fire)return{c:"#22c55e",l:"🔥 Promoção!"};if(v<=good)return{c:"#86efac",l:"✅ Boa oferta"};return{c:"#ef4444",l:"😬 Caro"}}
function ciaColor(n){const k=(n||"").toLowerCase();if(k.includes("latam"))return"#e31837";if(k.includes("american"))return"#0078d2";if(k.includes("copa"))return"#004b87";if(k.includes("tap"))return"#006b3f";return"#7c3aed"}
function isFuture(d){return new Date(d)>new Date()}
function fmtDate(d){if(!d)return"—";const p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0]}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────────────
const FL_TABS=[{icon:"🏠",label:"Início"},{icon:"📈",label:"Histórico"},{icon:"✈️",label:"Cias"},{icon:"🗺️",label:"Rotas"},{icon:"💡",label:"Dicas"}];
const BA_TABS=[{icon:"🇦🇷",label:"Oport."},{icon:"📊",label:"Histórico"},{icon:"💡",label:"Dicas"}];

function updateTabBar(){
  const tabs=DEST==="florida"?FL_TABS:BA_TABS;
  const bar=document.getElementById("tabbar");
  bar.innerHTML=tabs.map((t,i)=>`<button class="tab${i===CUR_TAB?" active":""}" id="tab${i}" onclick="goTab(${i})"><span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span></button>`).join("");
}

function setDest(d){
  DEST=d; CUR_TAB=0;
  document.getElementById("dest-fl").classList.toggle("active",d==="florida");
  document.getElementById("dest-ba").classList.toggle("active",d==="buenos_aires");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById((d==="florida"?"fl":"ba")+"-0").classList.add("active");
  updateTabBar();
  if(d==="florida") renderFlorida();
  else renderBA();
}

function goTab(i){
  CUR_TAB=i;
  const prefix=DEST==="florida"?"fl":"ba";
  document.querySelectorAll(".page").forEach(p=>{if(p.id.startsWith(prefix))p.classList.remove("active")});
  const page=document.getElementById(prefix+"-"+i);
  if(page)page.classList.add("active");
  updateTabBar();
  if(DEST==="florida")renderFlorida();
  else renderBA();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadAll(){
  // Florida
  try{
    const r=await fetch(FL_SHEETS+"&t="+Date.now());
    const t=await r.text();
    FL_DATA=t.trim().split("\n").slice(4).filter(l=>l.trim()).map(l=>{
      const c=l.split(",");
      return{date:c[0]?.trim(),econ:pp(c[1]),exec:pp(c[2]),cia:c[3]?.trim()||"—",best:pp(c[4]),queda:c[5]?.trim(),oferta:c[6]?.trim(),alerta:c[7]?.trim(),obs:c[8]?.trim()};
    }).filter(r=>r.date&&r.econ>0);
  }catch(e){console.error("FL load:",e)}

  // Buenos Aires
  if(BA_SHEETS){
    try{
      const r=await fetch(BA_SHEETS+"&t="+Date.now());
      const t=await r.text();
      BA_DATA=t.trim().split("\n").slice(1).filter(l=>l.trim()).map(l=>{
        const c=l.split(",");
        return{date:c[0]?.trim(),hora:c[1]?.trim(),feriado:c[2]?.trim(),data_ida:c[3]?.trim(),data_volta:c[4]?.trim(),dias:c[5]?.trim(),preco_pp:pp(c[6]),cia:c[7]?.trim()||"—",oferta:c[8]?.trim(),alerta:c[9]?.trim(),obs:c[10]?.trim()};
      }).filter(r=>r.feriado);
    }catch(e){console.error("BA load:",e)}
  }

  renderFlorida();
  renderBA();
}

// ── FLORIDA RENDER ────────────────────────────────────────────────────────────
function renderFlorida(){
  const i=CUR_TAB;
  if(DEST!=="florida")return;
  if(i===0)renderFlHome();
  else if(i===1)renderFlHist();
  else if(i===2)renderFlCias();
  else if(i===3)renderFlRotas();
  else if(i===4)renderFlDicas();
}

function renderFlHome(){
  const el=document.getElementById("fl-0");
  const latest=FL_DATA[FL_DATA.length-1];
  const prev=FL_DATA[FL_DATA.length-2];
  const alerts=FL_DATA.filter(r=>r.alerta?.toUpperCase()==="SIM");
  const bestEcon=FL_DATA.length?Math.min(...FL_DATA.map(r=>r.econ).filter(Boolean)):0;
  const lastUpd=FL_DATA.length?FL_DATA[FL_DATA.length-1].date:"—";
  const et=latest?pTag(latest.econ,FL_ECON_FIRE,FL_ECON_GOOD):{c:"#334155",l:"Sem dados"};
  const xt=latest?pTag(latest.exec,FL_EXEC_FIRE,FL_EXEC_GOOD):{c:"#334155",l:"Sem dados"};

  let alertBanner="";
  if(alerts.length) alertBanner=`<div class="alert-banner"><div style="font-size:14px;color:#86efac;font-weight:800">🔥 ${alerts.length} oferta detectada!</div><div style="font-size:12px;color:#4ade80;margin-top:4px">WhatsApp enviado</div></div>`;

  let pricesHtml="";
  if(latest&&latest.econ){
    const ePct=Math.min(96,Math.max(4,((latest.econ-2000)/(7000-2000)*100)));
    const xPct=latest.exec?Math.min(96,Math.max(4,((latest.exec-5000)/(22000-5000)*100))):0;
    const eDelta=prev&&prev.econ?(latest.econ-prev.econ):null;
    pricesHtml=`
    <div class="card">
      <div style="font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">✈️ Econômica — Hoje</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div><div style="font-size:30px;font-weight:900;color:${et.c};letter-spacing:-1px">${fmt(latest.econ)}</div><div style="font-size:11px;color:#64748b;margin-top:4px">por pessoa • ${latest.cia}</div></div>
        <div style="text-align:right"><span class="tag" style="background:${et.c}22;color:${et.c}">${et.l}</span>${eDelta!==null?`<div style="font-size:11px;color:${eDelta<0?"#22c55e":"#ef4444"};margin-top:6px">${eDelta<0?"▼":"▲"} ${fmt(Math.abs(eDelta))} vs ontem</div>`:""}
        </div>
      </div>
      <div class="gauge-track"><div style="position:absolute;left:0;top:0;height:100%;width:30%;background:#22c55e22;border-right:1px solid #22c55e44"></div><div style="position:absolute;left:30%;top:0;height:100%;width:20%;background:#f59e0b22;border-right:1px solid #f59e0b44"></div><div class="gauge-dot" style="left:${ePct}%;background:${et.c};display:block"></div></div>
      <div class="gauge-labels"><span>R$2k</span><span style="color:#22c55e">🔥3,5k</span><span style="color:#f59e0b">4,5k</span><span>7k</span></div>
    </div>
    <div class="card">
      <div style="font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">🛋️ Executiva — Hoje</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div><div style="font-size:30px;font-weight:900;color:${xt.c};letter-spacing:-1px">${fmt(latest.exec)}</div><div style="font-size:11px;color:#64748b;margin-top:4px">por pessoa • ${latest.cia}</div></div>
        <div><span class="tag" style="background:${xt.c}22;color:${xt.c}">${xt.l}</span></div>
      </div>
      <div class="gauge-track"><div style="position:absolute;left:0;top:0;height:100%;width:24%;background:#22c55e22;border-right:1px solid #22c55e44"></div><div style="position:absolute;left:24%;top:0;height:100%;width:23%;background:#f59e0b22;border-right:1px solid #f59e0b44"></div>${xPct?`<div class="gauge-dot" style="left:${xPct}%;background:${xt.c};display:block"></div>`:""}</div>
      <div class="gauge-labels"><span>R$5k</span><span style="color:#22c55e">🔥9k</span><span style="color:#f59e0b">13k</span><span>22k</span></div>
    </div>`;
  } else {
    pricesHtml=`<div class="card"><div class="empty"><div class="empty-icon">⏳</div>Passagens para Maio 2027 ainda não abertas. O sistema monitora 3x por dia e avisa quando abrirem!</div></div>`;
  }

  el.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0a1628;border:1px solid #1e293b;border-radius:14px;margin-bottom:14px">
    <div style="font-size:12px;color:#64748b">Última busca: ${lastUpd}</div>
    <button onclick="loadAll()" style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:7px 12px;color:#94a3b8;font-size:14px">🔄</button>
  </div>
  ${alertBanner}${pricesHtml}
  <div class="grid2">
    <div class="card-sm"><div style="font-size:22px;margin-bottom:6px">🏆</div><div style="font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;margin-bottom:4px">Recorde histórico</div><div style="font-size:18px;font-weight:800">${fmt(bestEcon)||"—"}</div><div style="font-size:10px;color:#64748b">menor econômica</div></div>
    <div class="card-sm"><div style="font-size:22px;margin-bottom:6px">🔔</div><div style="font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;margin-bottom:4px">Alertas enviados</div><div style="font-size:18px;font-weight:800">${alerts.length}</div><div style="font-size:10px;color:#64748b">via WhatsApp</div></div>
    <div class="card-sm"><div style="font-size:22px;margin-bottom:6px">📊</div><div style="font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;margin-bottom:4px">Dias monitorados</div><div style="font-size:18px;font-weight:800">${FL_DATA.length}</div><div style="font-size:10px;color:#64748b">registros</div></div>
    <div class="card-sm"><div style="font-size:22px;margin-bottom:6px">🎯</div><div style="font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;margin-bottom:4px">Janela ideal</div><div style="font-size:18px;font-weight:800">Ago–Set/26</div><div style="font-size:10px;color:#64748b">melhor momento</div></div>
  </div>
  ${FL_DATA.length>1?`<div class="card"><div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:12px">Econômica — evolução</div><canvas id="fl-mini" height="90" style="width:100%"></canvas><div style="font-size:10px;color:#475569;margin-top:6px">linha verde = gatilho de alerta R$3.500</div></div>`:""}`;

  if(FL_DATA.length>1){
    setTimeout(()=>drawLine("fl-mini",FL_DATA.map(r=>r.econ),FL_DATA.map(r=>r.date),"#38bdf8",FL_ECON_FIRE,2000,7000,80),50);
  }
}

function renderFlHist(){
  const el=document.getElementById("fl-1");
  const mode=window._histMode||"econ";
  const vals=FL_DATA.map(r=>r[mode]).filter(Boolean);
  const minV=vals.length?Math.min(...vals):0,maxV=vals.length?Math.max(...vals):0,avgV=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const fire=mode==="econ"?FL_ECON_FIRE:FL_EXEC_FIRE,good=mode==="econ"?FL_ECON_GOOD:FL_EXEC_GOOD;

function getBAPriceForFeriado(nome,dataIda){
  if(!BA_DATA.length)return null;
  const match=BA_DATA.filter(r=>r.feriado===nome||r.data_ida===dataIda);
  if(!match.length)return null;
  return match[match.length-1];
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function drawLine(id,values,labels,color,fireLine,minY,maxY,h){
  const canvas=document.getElementById(id);if(!canvas)return;
  canvas.height=h;const ctx=canvas.getContext("2d");const W=canvas.offsetWidth||300;canvas.width=W;ctx.clearRect(0,0,W,h);
  const pad={t:10,r:10,b:20,l:40};const cW=W-pad.l-pad.r,cH=h-pad.t-pad.b;
  const vals=values.filter(Boolean);if(!vals.length)return;
  const toX=i=>pad.l+i*(cW/Math.max(values.length-1,1));
  const toY=v=>pad.t+cH-(((v||minY)-minY)/(maxY-minY))*cH;
  [0,.25,.5,.75,1].forEach(p=>{const y=pad.t+cH*p;ctx.strokeStyle="#0f1f38";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();ctx.fillStyle="#475569";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText("R$"+Math.round(maxY-p*(maxY-minY))/1000+"k",pad.l-4,y+3);});
  const fY=toY(fireLine);ctx.strokeStyle="#22c55e";ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,fY);ctx.lineTo(pad.l+cW,fY);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.beginPath();let first=true;
  values.forEach((v,i)=>{if(!v)return;const x=toX(i),y=toY(v);if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);});ctx.stroke();
  values.forEach((v,i)=>{if(!v)return;ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  ctx.fillStyle="#475569";ctx.font="8px sans-serif";ctx.textAlign="center";
  if(labels.length){ctx.fillText(labels[0],toX(0),h-4);if(labels.length>1)ctx.fillText(labels[labels.length-1],toX(labels.length-1),h-4);}
}

function drawBar(id,labels,values,colors){
  const canvas=document.getElementById(id);if(!canvas)return;
  const h=Math.max(140,labels.length*36);canvas.height=h;
  const ctx=canvas.getContext("2d");const W=canvas.offsetWidth||300;canvas.width=W;ctx.clearRect(0,0,W,h);
  const pad={t:10,r:60,b:10,l:65};const cW=W-pad.l-pad.r,cH=h-pad.t-pad.b;
  const maxV=Math.max(...values)*1.1||1;const barH=Math.min(22,cH/values.length-6);
  values.forEach((v,i)=>{
    const y=pad.t+i*(cH/values.length)+(cH/values.length-barH)/2;const bW=(v/maxV)*cW;const r=5;
    ctx.fillStyle=colors[i]||"#7c3aed";ctx.beginPath();ctx.moveTo(pad.l+r,y);ctx.lineTo(pad.l+bW-r,y);ctx.quadraticCurveTo(pad.l+bW,y,pad.l+bW,y+r);ctx.lineTo(pad.l+bW,y+barH-r);ctx.quadraticCurveTo(pad.l+bW,y+barH,pad.l+bW-r,y+barH);ctx.lineTo(pad.l+r,y+barH);ctx.quadraticCurveTo(pad.l,y+barH,pad.l,y+barH-r);ctx.lineTo(pad.l,y+r);ctx.quadraticCurveTo(pad.l,y,pad.l+r,y);ctx.closePath();ctx.fill();
    ctx.fillStyle="#94a3b8";ctx.font="bold 10px sans-serif";ctx.textAlign="right";ctx.fillText(labels[i],pad.l-5,y+barH/2+4);
    ctx.fillStyle="#e2e8f0";ctx.font="bold 10px sans-serif";ctx.textAlign="left";ctx.fillText("R$"+(v/1000).toFixed(1)+"k",pad.l+bW+5,y+barH/2+4);
  });
}
